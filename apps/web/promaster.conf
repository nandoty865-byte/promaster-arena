<VirtualHost *:80>
    ServerName 187.77.238.247
    DocumentRoot /var/www/html/promaster

    <Directory /var/www/html/promaster>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/promaster_error.log
    CustomLog ${APACHE_LOG_DIR}/promaster_access.log combined
</VirtualHost>
