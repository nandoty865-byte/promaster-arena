name: Verificacoes

on:
  pull_request:
    branches:
      - homologacao
      - main
  push:
    branches:
      - homologacao
      - main
  workflow_dispatch:

concurrency:
  group: verificacoes-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validar:
    name: Validar projeto
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/playfinal_ci

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json

      - name: Instalar dependencias da API
        run: npm ci

      - name: Checar sintaxe da API
        run: node --check index.js

      - name: Validar Prisma
        run: npx prisma validate

      - name: Instalar dependencias do frontend
        run: npm ci
        working-directory: apps/web

      - name: Build do frontend
        run: npm run build
        working-directory: apps/web

      - name: Lint do frontend em modo informativo
        run: npm run lint
        working-directory: apps/web
        continue-on-error: true

  deploy-homologacao:
    name: Publicar homologacao
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validar
    if: github.event_name == 'push' && github.ref == 'refs/heads/homologacao'
    environment: homologacao

    env:
      HOMOLOG_SSH_HOST: ${{ secrets.HOMOLOG_SSH_HOST }}
      HOMOLOG_SSH_USER: ${{ secrets.HOMOLOG_SSH_USER }}
      HOMOLOG_SSH_KEY: ${{ secrets.HOMOLOG_SSH_KEY }}
      HOMOLOG_APP_DIR: ${{ secrets.HOMOLOG_APP_DIR || '/opt/promaster-arena-homolog' }}

    steps:
      - name: Conferir segredos obrigatorios
        id: segredos
        run: |
          if [ -z "$HOMOLOG_SSH_HOST" ] || [ -z "$HOMOLOG_SSH_USER" ] || [ -z "$HOMOLOG_SSH_KEY" ]; then
            echo "pronto=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy de homologacao ignorado: cadastre HOMOLOG_SSH_HOST, HOMOLOG_SSH_USER e HOMOLOG_SSH_KEY nos segredos do GitHub."
          else
            echo "pronto=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Preparar acesso SSH
        if: steps.segredos.outputs.pronto == 'true'
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$HOMOLOG_SSH_KEY" > ~/.ssh/homologacao
          chmod 600 ~/.ssh/homologacao
          ssh-keyscan -H "$HOMOLOG_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Rodar deploy na VPS de homologacao
        if: steps.segredos.outputs.pronto == 'true'
        run: |
          ssh -i ~/.ssh/homologacao "$HOMOLOG_SSH_USER@$HOMOLOG_SSH_HOST" "HOMOLOG_APP_DIR='$HOMOLOG_APP_DIR' bash -s" <<'REMOTE_DEPLOY'
          set -euo pipefail

          APP_DIR="${HOMOLOG_APP_DIR:-/opt/promaster-arena-homolog}"

          echo "Usuario remoto: $(whoami)"
          echo "Diretorio do app: $APP_DIR"

          if [ ! -d "$APP_DIR/.git" ]; then
            echo "Deploy bloqueado: diretorio Git nao encontrado em $APP_DIR."
            exit 1
          fi

          cd "$APP_DIR"

          echo "Branch atual: $(git branch --show-current)"
          echo "Ultimos commits:"
          git log --oneline --decorate -5

          echo "Status antes do deploy:"
          git status --short

          ./deploy-staging.sh
          REMOTE_DEPLOY
